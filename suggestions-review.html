<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synonym Suggestions Review</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="text-gray-800 antialiased bg-gray-50">
    <header class="bg-blue-800 text-white shadow-md">
        <div class="container mx-auto p-4">
            <div class="flex justify-between items-center">
                <h1 class="text-3xl font-extrabold">Synonym Suggestions Review</h1>
                <a href="/" class="bg-blue-700 hover:bg-blue-600 px-4 py-2 rounded-lg transition-colors">
                    Back to Main
                </a>
            </div>
        </div>
    </header>
    
    <div class="container mx-auto p-4">
        <main>
            <!-- Stats Section -->
            <div class="bg-white rounded-lg shadow-md p-6 mb-6">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="text-center">
                        <div class="text-2xl font-bold text-blue-600" id="total-suggestions">0</div>
                        <div class="text-gray-600">Total Suggestions</div>
                    </div>
                    <div class="text-center">
                        <div class="text-2xl font-bold text-green-600" id="approved-count">0</div>
                        <div class="text-gray-600">Approved</div>
                    </div>
                    <div class="text-center">
                        <div class="text-2xl font-bold text-red-600" id="rejected-count">0</div>
                        <div class="text-gray-600">Rejected</div>
                    </div>
                </div>
            </div>

            <!-- Controls Section -->
            <div class="bg-white rounded-lg shadow-md p-6 mb-6">
                <div class="flex flex-wrap gap-4 items-center justify-between">
                    <div class="flex gap-2">
                        <button id="select-all-btn" class="bg-gray-600 hover:bg-gray-700 text-white px-4 py-2 rounded-lg transition-colors">
                            Select All
                        </button>
                        <button id="deselect-all-btn" class="bg-gray-600 hover:bg-gray-700 text-white px-4 py-2 rounded-lg transition-colors">
                            Deselect All
                        </button>
                    </div>
                    <div class="flex gap-2">
                        <button id="approve-selected-btn" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg transition-colors">
                            Approve Selected
                        </button>
                        <button id="reject-selected-btn" class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg transition-colors">
                            Reject Selected
                        </button>
                    </div>
                </div>
            </div>

            <!-- Suggestions Table -->
            <div class="bg-white rounded-lg shadow-md overflow-hidden">
                <div class="p-6 border-b">
                    <h2 class="text-xl font-semibold">Pending Suggestions</h2>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    <input type="checkbox" id="select-all-checkbox" class="rounded border-gray-300">
                                </th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    New Term
                                </th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    Suggested Mapping
                                </th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    Confidence Score
                                </th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    Created At
                                </th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    Actions
                                </th>
                            </tr>
                        </thead>
                        <tbody id="suggestions-tbody" class="bg-white divide-y divide-gray-200">
                            <!-- Suggestions will be populated here -->
                        </tbody>
                    </table>
                </div>
                <div id="no-suggestions" class="p-8 text-center text-gray-500 hidden">
                    <div class="text-4xl mb-4">📝</div>
                    <div class="text-xl font-medium mb-2">No pending suggestions</div>
                    <div>All suggestions have been reviewed or there are no new suggestions to review.</div>
                </div>
            </div>
        </main>
    </div>

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-lg p-6 flex items-center space-x-3">
            <div class="animate-spin rounded-full h-6 w-6 border-b-2 border-blue-600"></div>
            <span class="text-gray-700">Processing...</span>
        </div>
    </div>

    <!-- Success/Error Messages -->
    <div id="message-container" class="fixed top-4 right-4 z-50"></div>

    <script>
        // Configuration
        const API_KEY = 'my-secret-dev-key';
        const API_BASE = '';

        // State
        let suggestions = [];
        let selectedIds = new Set();

        // DOM Elements
        const suggestionsTbody = document.getElementById('suggestions-tbody');
        const noSuggestions = document.getElementById('no-suggestions');
        const selectAllCheckbox = document.getElementById('select-all-checkbox');
        const selectAllBtn = document.getElementById('select-all-btn');
        const deselectAllBtn = document.getElementById('deselect-all-btn');
        const approveSelectedBtn = document.getElementById('approve-selected-btn');
        const rejectSelectedBtn = document.getElementById('reject-selected-btn');
        const loadingOverlay = document.getElementById('loading-overlay');
        const messageContainer = document.getElementById('message-container');

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            loadSuggestions();
            setupEventListeners();
        });

        function setupEventListeners() {
            selectAllCheckbox.addEventListener('change', toggleSelectAll);
            selectAllBtn.addEventListener('click', selectAll);
            deselectAllBtn.addEventListener('click', deselectAll);
            approveSelectedBtn.addEventListener('click', () => bulkAction('approve'));
            rejectSelectedBtn.addEventListener('click', () => bulkAction('reject'));
        }

        async function loadSuggestions() {
            showLoading(true);
            try {
                const response = await fetch(`${API_BASE}/api/suggestions`, {
                    headers: {
                        'X-API-KEY': API_KEY
                    }
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                suggestions = await response.json();
                renderSuggestions();
                updateStats();
            } catch (error) {
                showMessage('Error loading suggestions: ' + error.message, 'error');
            } finally {
                showLoading(false);
            }
        }

        function renderSuggestions() {
            if (suggestions.length === 0) {
                suggestionsTbody.innerHTML = '';
                noSuggestions.classList.remove('hidden');
                return;
            }

            noSuggestions.classList.add('hidden');
            suggestionsTbody.innerHTML = suggestions.map(suggestion => `
                <tr class="hover:bg-gray-50">
                    <td class="px-6 py-4 whitespace-nowrap">
                        <input type="checkbox" 
                               class="suggestion-checkbox rounded border-gray-300" 
                               data-id="${suggestion.id}"
                               ${selectedIds.has(suggestion.id) ? 'checked' : ''}>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">
                        ${escapeHtml(suggestion.new_term)}
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">
                        ${escapeHtml(suggestion.suggested_mapping)}
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">
                        <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${
                            suggestion.confidence_score >= 0.9 ? 'bg-green-100 text-green-800' :
                            suggestion.confidence_score >= 0.8 ? 'bg-yellow-100 text-yellow-800' :
                            'bg-red-100 text-red-800'
                        }">
                            ${(suggestion.confidence_score * 100).toFixed(1)}%
                        </span>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                        ${formatDate(suggestion.created_at)}
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium">
                        <button onclick="singleAction(${suggestion.id}, 'approve')" 
                                class="text-green-600 hover:text-green-900 mr-3">
                            Approve
                        </button>
                        <button onclick="singleAction(${suggestion.id}, 'reject')" 
                                class="text-red-600 hover:text-red-900">
                            Reject
                        </button>
                    </td>
                </tr>
            `).join('');

            // Re-attach checkbox event listeners
            document.querySelectorAll('.suggestion-checkbox').forEach(checkbox => {
                checkbox.addEventListener('change', function() {
                    const id = parseInt(this.dataset.id);
                    if (this.checked) {
                        selectedIds.add(id);
                    } else {
                        selectedIds.delete(id);
                    }
                    updateSelectAllState();
                });
            });
        }

        function updateStats() {
            document.getElementById('total-suggestions').textContent = suggestions.length;
            // Note: We could add approved/rejected counts if we track them
        }

        function toggleSelectAll() {
            const checkboxes = document.querySelectorAll('.suggestion-checkbox');
            checkboxes.forEach(checkbox => {
                checkbox.checked = selectAllCheckbox.checked;
                const id = parseInt(checkbox.dataset.id);
                if (selectAllCheckbox.checked) {
                    selectedIds.add(id);
                } else {
                    selectedIds.delete(id);
                }
            });
        }

        function selectAll() {
            selectAllCheckbox.checked = true;
            toggleSelectAll();
        }

        function deselectAll() {
            selectAllCheckbox.checked = false;
            toggleSelectAll();
        }

        function updateSelectAllState() {
            const checkboxes = document.querySelectorAll('.suggestion-checkbox');
            const checkedCount = checkboxes.length;
            const selectedCount = selectedIds.size;
            
            selectAllCheckbox.checked = selectedCount === checkedCount && checkedCount > 0;
            selectAllCheckbox.indeterminate = selectedCount > 0 && selectedCount < checkedCount;
        }

        async function singleAction(id, action) {
            await bulkAction(action, [id]);
        }

        async function bulkAction(action, ids = null) {
            const targetIds = ids || Array.from(selectedIds);
            if (targetIds.length === 0) {
                showMessage('Please select at least one suggestion', 'warning');
                return;
            }

            showLoading(true);
            try {
                const updates = targetIds.map(id => ({ id, action }));
                const response = await fetch(`${API_BASE}/api/suggestions/update`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-API-KEY': API_KEY
                    },
                    body: JSON.stringify({ updates })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const result = await response.json();
                showMessage(`Successfully ${action}ed ${result.success_count} suggestions`, 'success');
                
                // Remove processed suggestions from the list
                suggestions = suggestions.filter(s => !targetIds.includes(s.id));
                selectedIds.clear();
                renderSuggestions();
                updateStats();
            } catch (error) {
                showMessage(`Error ${action}ing suggestions: ${error.message}`, 'error');
            } finally {
                showLoading(false);
            }
        }

        function showLoading(show) {
            loadingOverlay.classList.toggle('hidden', !show);
        }

        function showMessage(message, type = 'info') {
            const messageDiv = document.createElement('div');
            messageDiv.className = `p-4 rounded-lg shadow-lg mb-4 max-w-sm ${
                type === 'success' ? 'bg-green-500 text-white' :
                type === 'error' ? 'bg-red-500 text-white' :
                type === 'warning' ? 'bg-yellow-500 text-white' :
                'bg-blue-500 text-white'
            }`;
            messageDiv.textContent = message;

            messageContainer.appendChild(messageDiv);

            setTimeout(() => {
                messageDiv.remove();
            }, 5000);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString() + ' ' + date.toLocaleTimeString();
        }
    </script>
</body>
</html>
