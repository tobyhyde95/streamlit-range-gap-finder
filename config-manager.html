<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuration Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="text-gray-800 antialiased bg-gray-50">
    <header class="bg-blue-800 text-white shadow-md">
        <div class="container mx-auto p-4">
            <div class="flex justify-between items-center">
                <h1 class="text-3xl font-extrabold">Configuration Manager</h1>
                <div class="flex gap-2">
                    <a href="/" class="bg-blue-700 hover:bg-blue-600 px-4 py-2 rounded-lg transition-colors">
                        Main App
                    </a>
                    <a href="/suggestions-review.html" class="bg-blue-700 hover:bg-blue-600 px-4 py-2 rounded-lg transition-colors">
                        Review Suggestions
                    </a>
                </div>
            </div>
        </div>
    </header>
    
    <div class="container mx-auto p-4">
        <main>
            <!-- Current Configuration Display -->
            <div class="bg-white rounded-lg shadow-md p-6 mb-6">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-semibold">Current Configuration</h2>
                    <button id="refresh-config-btn" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg transition-colors">
                        Refresh
                    </button>
                </div>
                
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <!-- Identifier Patterns -->
                    <div>
                        <h3 class="font-semibold text-gray-700 mb-2">Identifier Patterns</h3>
                        <div id="identifier-patterns" class="bg-gray-50 p-3 rounded border text-sm">
                            Loading...
                        </div>
                    </div>
                    
                    <!-- Category Synonyms -->
                    <div>
                        <h3 class="font-semibold text-gray-700 mb-2">Category Synonyms</h3>
                        <div id="category-synonyms" class="bg-gray-50 p-3 rounded border text-sm">
                            Loading...
                        </div>
                    </div>
                    
                    <!-- Facet Synonyms -->
                    <div>
                        <h3 class="font-semibold text-gray-700 mb-2">Facet Synonyms</h3>
                        <div id="facet-synonyms" class="bg-gray-50 p-3 rounded border text-sm">
                            Loading...
                        </div>
                    </div>
                </div>
            </div>

            <!-- Add New Synonym -->
            <div class="bg-white rounded-lg shadow-md p-6 mb-6">
                <h2 class="text-xl font-semibold mb-4">Add New Synonym Rule</h2>
                <form id="add-synonym-form" class="space-y-4">
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Type</label>
                            <select id="synonym-type" class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                                <option value="facet">Facet Synonym</option>
                                <option value="category">Category Synonym</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Raw Term</label>
                            <input type="text" id="raw-term" placeholder="e.g., screwlength" class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Canonical Term</label>
                            <input type="text" id="canonical-term" placeholder="e.g., length_mm" class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div class="flex items-end">
                            <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg transition-colors">
                                Add Synonym
                            </button>
                        </div>
                    </div>
                </form>
            </div>

            <!-- Edit Configuration -->
            <div class="bg-white rounded-lg shadow-md p-6">
                <h2 class="text-xl font-semibold mb-4">Edit Configuration (Advanced)</h2>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Full Configuration JSON</label>
                    <textarea id="config-json" rows="15" class="w-full border border-gray-300 rounded-lg px-3 py-2 font-mono text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
                </div>
                <div class="flex gap-2">
                    <button id="load-config-btn" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg transition-colors">
                        Load Current Config
                    </button>
                    <button id="save-config-btn" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg transition-colors">
                        Save Configuration
                    </button>
                </div>
            </div>
        </main>
    </div>

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-lg p-6 flex items-center space-x-3">
            <div class="animate-spin rounded-full h-6 w-6 border-b-2 border-blue-600"></div>
            <span class="text-gray-700">Processing...</span>
        </div>
    </div>

    <!-- Success/Error Messages -->
    <div id="message-container" class="fixed top-4 right-4 z-50"></div>

    <!-- Edit Modal -->
    <div id="edit-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-lg p-6 w-full max-w-md">
            <h3 id="edit-modal-title" class="text-lg font-semibold mb-4">Edit Rule</h3>
            <form id="edit-form" class="space-y-4">
                <div>
                    <label id="edit-label-1" class="block text-sm font-medium text-gray-700 mb-1">Raw Term</label>
                    <input type="text" id="edit-input-1" class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div id="edit-field-2" class="hidden">
                    <label id="edit-label-2" class="block text-sm font-medium text-gray-700 mb-1">Canonical Term</label>
                    <input type="text" id="edit-input-2" class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div class="flex gap-2 justify-end">
                    <button type="button" onclick="closeEditModal()" class="bg-gray-500 hover:bg-gray-600 text-white px-4 py-2 rounded-lg transition-colors">
                        Cancel
                    </button>
                    <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg transition-colors">
                        Save
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Configuration
        const API_KEY = 'my-secret-dev-key';
        const API_BASE = '';

        // DOM Elements
        const identifierPatterns = document.getElementById('identifier-patterns');
        const categorySynonyms = document.getElementById('category-synonyms');
        const facetSynonyms = document.getElementById('facet-synonyms');
        const configJson = document.getElementById('config-json');
        const addSynonymForm = document.getElementById('add-synonym-form');
        const refreshConfigBtn = document.getElementById('refresh-config-btn');
        const loadConfigBtn = document.getElementById('load-config-btn');
        const saveConfigBtn = document.getElementById('save-config-btn');
        const loadingOverlay = document.getElementById('loading-overlay');
        const messageContainer = document.getElementById('message-container');

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            loadConfiguration();
            setupEventListeners();
        });

        function setupEventListeners() {
            refreshConfigBtn.addEventListener('click', loadConfiguration);
            loadConfigBtn.addEventListener('click', loadCurrentConfig);
            saveConfigBtn.addEventListener('click', saveConfiguration);
            addSynonymForm.addEventListener('submit', addSynonym);
        }

        async function loadConfiguration() {
            showLoading(true);
            try {
                const response = await fetch(`${API_BASE}/api/config`, {
                    headers: {
                        'X-API-KEY': API_KEY
                    }
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const config = await response.json();
                displayConfiguration(config);
            } catch (error) {
                showMessage('Error loading configuration: ' + error.message, 'error');
            } finally {
                showLoading(false);
            }
        }

        function displayConfiguration(config) {
            // Store current config for editing
            window.currentConfig = config;
            
            // Display identifier patterns with edit functionality
            identifierPatterns.innerHTML = config.identifier_patterns?.map((pattern, index) => 
                `<div class="mb-1 p-1 bg-white rounded flex items-center justify-between group hover:bg-gray-50">
                    <span class="pattern-text">${escapeHtml(pattern)}</span>
                    <div class="hidden group-hover:flex gap-1">
                        <button onclick="editPattern(${index})" class="text-blue-600 hover:text-blue-800 text-xs px-2 py-1 rounded">Edit</button>
                        <button onclick="deletePattern(${index})" class="text-red-600 hover:text-red-800 text-xs px-2 py-1 rounded">Delete</button>
                    </div>
                </div>`
            ).join('') || '<div class="text-gray-500">No patterns defined</div>';

            // Display category synonyms with edit functionality
            categorySynonyms.innerHTML = Object.entries(config.category_synonyms || {}).map(([raw, canonical], index) => 
                `<div class="mb-1 p-1 bg-white rounded flex items-center justify-between group hover:bg-gray-50">
                    <span class="synonym-text"><span class="font-medium">${escapeHtml(raw)}</span> → <span class="text-blue-600">${escapeHtml(canonical)}</span></span>
                    <div class="hidden group-hover:flex gap-1">
                        <button onclick="editCategorySynonym('${escapeHtml(raw)}', '${escapeHtml(canonical)}')" class="text-blue-600 hover:text-blue-800 text-xs px-2 py-1 rounded">Edit</button>
                        <button onclick="deleteCategorySynonym('${escapeHtml(raw)}')" class="text-red-600 hover:text-red-800 text-xs px-2 py-1 rounded">Delete</button>
                    </div>
                </div>`
            ).join('') || '<div class="text-gray-500">No category synonyms defined</div>';

            // Display facet synonyms with edit functionality
            facetSynonyms.innerHTML = Object.entries(config.facet_synonyms || {}).map(([raw, canonical], index) => 
                `<div class="mb-1 p-1 bg-white rounded flex items-center justify-between group hover:bg-gray-50">
                    <span class="synonym-text"><span class="font-medium">${escapeHtml(raw)}</span> → <span class="text-blue-600">${escapeHtml(canonical)}</span></span>
                    <div class="hidden group-hover:flex gap-1">
                        <button onclick="editFacetSynonym('${escapeHtml(raw)}', '${escapeHtml(canonical)}')" class="text-blue-600 hover:text-blue-800 text-xs px-2 py-1 rounded">Edit</button>
                        <button onclick="deleteFacetSynonym('${escapeHtml(raw)}')" class="text-red-600 hover:text-red-800 text-xs px-2 py-1 rounded">Delete</button>
                    </div>
                </div>`
            ).join('') || '<div class="text-gray-500">No facet synonyms defined</div>';
        }

        function loadCurrentConfig() {
            configJson.value = JSON.stringify(window.currentConfig, null, 2);
        }

        // Edit and Delete Functions
        let currentEditData = {};

        function editPattern(index) {
            const oldPattern = window.currentConfig.identifier_patterns[index];
            currentEditData = { type: 'pattern', index: index, oldValue: oldPattern };
            
            document.getElementById('edit-modal-title').textContent = 'Edit Pattern';
            document.getElementById('edit-label-1').textContent = 'Pattern';
            document.getElementById('edit-input-1').value = oldPattern;
            document.getElementById('edit-field-2').classList.add('hidden');
            
            document.getElementById('edit-modal').classList.remove('hidden');
            document.getElementById('edit-input-1').focus();
        }

        function deletePattern(index) {
            if (confirm('Are you sure you want to delete this pattern?')) {
                window.currentConfig.identifier_patterns.splice(index, 1);
                saveConfigurationFromMemory();
            }
        }

        function editCategorySynonym(rawTerm, canonicalTerm) {
            currentEditData = { type: 'category', oldRaw: rawTerm, oldCanonical: canonicalTerm };
            
            document.getElementById('edit-modal-title').textContent = 'Edit Category Synonym';
            document.getElementById('edit-label-1').textContent = 'Raw Term';
            document.getElementById('edit-label-2').textContent = 'Canonical Term';
            document.getElementById('edit-input-1').value = rawTerm;
            document.getElementById('edit-input-2').value = canonicalTerm;
            document.getElementById('edit-field-2').classList.remove('hidden');
            
            document.getElementById('edit-modal').classList.remove('hidden');
            document.getElementById('edit-input-1').focus();
        }

        function deleteCategorySynonym(rawTerm) {
            if (confirm('Are you sure you want to delete this category synonym?')) {
                delete window.currentConfig.category_synonyms[rawTerm];
                saveConfigurationFromMemory();
            }
        }

        function editFacetSynonym(rawTerm, canonicalTerm) {
            currentEditData = { type: 'facet', oldRaw: rawTerm, oldCanonical: canonicalTerm };
            
            document.getElementById('edit-modal-title').textContent = 'Edit Facet Synonym';
            document.getElementById('edit-label-1').textContent = 'Raw Term';
            document.getElementById('edit-label-2').textContent = 'Canonical Term';
            document.getElementById('edit-input-1').value = rawTerm;
            document.getElementById('edit-input-2').value = canonicalTerm;
            document.getElementById('edit-field-2').classList.remove('hidden');
            
            document.getElementById('edit-modal').classList.remove('hidden');
            document.getElementById('edit-input-1').focus();
        }

        function deleteFacetSynonym(rawTerm) {
            if (confirm('Are you sure you want to delete this facet synonym?')) {
                delete window.currentConfig.facet_synonyms[rawTerm];
                saveConfigurationFromMemory();
            }
        }

        function closeEditModal() {
            document.getElementById('edit-modal').classList.add('hidden');
            currentEditData = {};
        }

        // Handle edit form submission
        document.getElementById('edit-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const input1 = document.getElementById('edit-input-1').value.trim();
            const input2 = document.getElementById('edit-input-2').value.trim();
            
            if (!input1) {
                showMessage('Please enter a value', 'warning');
                return;
            }
            
            if (currentEditData.type === 'pattern') {
                if (input1 !== currentEditData.oldValue) {
                    window.currentConfig.identifier_patterns[currentEditData.index] = input1;
                    saveConfigurationFromMemory();
                }
            } else if (currentEditData.type === 'category' || currentEditData.type === 'facet') {
                if (!input2) {
                    showMessage('Please enter both values', 'warning');
                    return;
                }
                
                const synonyms = currentEditData.type === 'category' ? 
                    window.currentConfig.category_synonyms : 
                    window.currentConfig.facet_synonyms;
                
                if (input1 !== currentEditData.oldRaw || input2 !== currentEditData.oldCanonical) {
                    delete synonyms[currentEditData.oldRaw];
                    synonyms[input1] = input2;
                    saveConfigurationFromMemory();
                }
            }
            
            closeEditModal();
        });

        async function saveConfigurationFromMemory() {
            try {
                showLoading(true);
                const response = await fetch(`${API_BASE}/api/config`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-API-KEY': API_KEY
                    },
                    body: JSON.stringify(window.currentConfig)
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const result = await response.json();
                showMessage('Configuration updated successfully!', 'success');
                loadConfiguration(); // Refresh display
            } catch (error) {
                showMessage('Error saving configuration: ' + error.message, 'error');
            } finally {
                showLoading(false);
            }
        }

        async function saveConfiguration() {
            try {
                const config = JSON.parse(configJson.value);
                
                showLoading(true);
                const response = await fetch(`${API_BASE}/api/config`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-API-KEY': API_KEY
                    },
                    body: JSON.stringify(config)
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const result = await response.json();
                showMessage('Configuration saved successfully!', 'success');
                loadConfiguration(); // Refresh display
            } catch (error) {
                showMessage('Error saving configuration: ' + error.message, 'error');
            } finally {
                showLoading(false);
            }
        }

        async function addSynonym(event) {
            event.preventDefault();
            
            const type = document.getElementById('synonym-type').value;
            const rawTerm = document.getElementById('raw-term').value.trim();
            const canonicalTerm = document.getElementById('canonical-term').value.trim();
            
            if (!rawTerm || !canonicalTerm) {
                showMessage('Please fill in all fields', 'warning');
                return;
            }

            showLoading(true);
            try {
                const response = await fetch(`${API_BASE}/api/config/synonyms`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-API-KEY': API_KEY
                    },
                    body: JSON.stringify({
                        type: type,
                        raw_term: rawTerm,
                        canonical_term: canonicalTerm
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const result = await response.json();
                showMessage(result.message, 'success');
                
                // Clear form and refresh
                addSynonymForm.reset();
                loadConfiguration();
            } catch (error) {
                showMessage('Error adding synonym: ' + error.message, 'error');
            } finally {
                showLoading(false);
            }
        }

        function showLoading(show) {
            loadingOverlay.classList.toggle('hidden', !show);
        }

        function showMessage(message, type = 'info') {
            const messageDiv = document.createElement('div');
            messageDiv.className = `p-4 rounded-lg shadow-lg mb-4 max-w-sm ${
                type === 'success' ? 'bg-green-500 text-white' :
                type === 'error' ? 'bg-red-500 text-white' :
                type === 'warning' ? 'bg-yellow-500 text-white' :
                'bg-blue-500 text-white'
            }`;
            messageDiv.textContent = message;

            messageContainer.appendChild(messageDiv);

            setTimeout(() => {
                messageDiv.remove();
            }, 5000);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
