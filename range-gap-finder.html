<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEO Competitor & Gap Analyser</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/exceljs@4.3.0/dist/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.autotable.umd.min.js"></script>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="text-gray-800 antialiased">
    <header class="bg-blue-800 text-white shadow-md">
        <div class="container mx-auto p-4">
            <div class="flex justify-between items-center">
                <h1 class="text-3xl font-extrabold">SEO Competitor & Gap Analyser</h1>
                <div class="flex gap-2">
                    <button id="project-manager-btn" class="bg-blue-700 hover:bg-blue-600 px-4 py-2 rounded-lg transition-colors">
                        Project Manager
                    </button>
                    <a href="/suggestions-review.html" class="bg-blue-700 hover:bg-blue-600 px-4 py-2 rounded-lg transition-colors">
                        Review Synonyms
                    </a>
                    <a href="/config-manager.html" class="bg-blue-700 hover:bg-blue-600 px-4 py-2 rounded-lg transition-colors">
                        Config Manager
                    </a>
                </div>
            </div>
        </div>
    </header>
    <div class="container mx-auto p-4">
        <main>
            <div id="controls-container"></div>
            <div id="progress-container" class="hidden"></div>
            <div id="results-container" class="max-w-7xl mx-auto mt-8 hidden"></div>
        </main>
    </div>
    
    <div id="keyword-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="flex justify-between items-center border-b pb-3 mb-4">
                <h3 id="modal-title" class="font-bold text-xl">Keywords in Group</h3>
                <button id="modal-close-btn" class="text-2xl font-bold">&times;</button>
            </div>
            <div id="modal-keyword-list"></div>
        </div>
    </div>

    <div id="project-manager-modal" class="modal-overlay hidden">
        <div class="modal-content max-w-4xl">
            <div class="flex justify-between items-center border-b pb-3 mb-4">
                <h3 class="font-bold text-xl">Project Manager</h3>
                <button id="project-modal-close-btn" class="text-2xl font-bold">&times;</button>
            </div>
            <div class="mb-4">
                <button id="new-project-btn" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg transition-colors">
                    Create New Project
                </button>
            </div>
            <div id="project-list" class="space-y-4"></div>
        </div>
    </div>

    <div id="new-project-modal" class="modal-overlay hidden">
        <div class="modal-content max-w-md">
            <div class="flex justify-between items-center border-b pb-3 mb-4">
                <h3 class="font-bold text-xl">Create New Project</h3>
                <button id="new-project-modal-close-btn" class="text-2xl font-bold">&times;</button>
            </div>
            <form id="new-project-form" class="space-y-4">
                <div>
                    <label for="project-name" class="block text-sm font-medium text-gray-700 mb-1">Project Name</label>
                    <input type="text" id="project-name" name="name" required 
                           class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label for="project-description" class="block text-sm font-medium text-gray-700 mb-1">Description (Optional)</label>
                    <textarea id="project-description" name="description" rows="3"
                              class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
                </div>
                <div class="flex justify-end gap-2">
                    <button type="button" id="cancel-new-project-btn" 
                            class="px-4 py-2 border border-gray-300 rounded-md hover:bg-gray-50 transition-colors">
                        Cancel
                    </button>
                    <button type="submit" 
                            class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-md transition-colors">
                        Create Project
                    </button>
                </div>
            </form>
        </div>
    </div>

    <div id="edit-project-modal" class="modal-overlay hidden">
        <div class="modal-content max-w-md">
            <div class="flex justify-between items-center border-b pb-3 mb-4">
                <h3 class="font-bold text-xl">Edit Project</h3>
                <button id="edit-project-modal-close-btn" class="text-2xl font-bold">&times;</button>
            </div>
            <form id="edit-project-form" class="space-y-4">
                <input type="hidden" id="edit-project-id" name="id">
                <div>
                    <label for="edit-project-name" class="block text-sm font-medium text-gray-700 mb-1">Project Name</label>
                    <input type="text" id="edit-project-name" name="name" required 
                           class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label for="edit-project-description" class="block text-sm font-medium text-gray-700 mb-1">Description (Optional)</label>
                    <textarea id="edit-project-description" name="description" rows="3"
                              class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
                </div>
                <div class="flex justify-end gap-2">
                    <button type="button" id="cancel-edit-project-btn" 
                            class="px-4 py-2 border border-gray-300 rounded-md hover:bg-gray-50 transition-colors">
                        Cancel
                    </button>
                    <button type="submit" 
                            class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-md transition-colors">
                        Update Project
                    </button>
                </div>
            </form>
        </div>
    </div>
